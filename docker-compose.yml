version: '2'

services:
  multitenant:
    image: seedling:latest
    container_name: "seedling"
    hostname: "seedling"
    ports:
      - 80:80
      - 443:443
    env_file:
      # Your dev environment definition file must exist at this location on your development machine.
      - "/etc/context.d/seedling.env"
    depends_on:
      # We still need wait-for-it.sh, even with these dependencies, because depends_on only ensures that the containers
      # are STARTED before multitenant. Not that they're "ready".
      - mysql
      - elastic
      - redis
    command:
      bin/wait-for-it.sh mysql:3306 --and bin/wait-for-it.sh -t 30 elastic:9200 --and /usr/bin/supervisord


  mysql:
    image: mysql:5.6.34
    container_name: "db-seedling"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      # Expose port 3306 on the container as port 3307 on the host, so that sql clients can connect to it.
      - 3307:3306
    volumes:
      - ./sql/docker/mysql-data:/var/lib/mysql
      - ./sql/docker/my.cnf:/etc/mysql/conf.d/dev.cnf
      - ./sql/docker:/docker-entrypoint-initdb.d

  mailhog:
    image: mailhog/mailhog:v1.0.0
    ports:
      - "1025:1025"
