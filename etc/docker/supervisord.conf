[supervisord]
nodaemon=true
logfile=/dev/fd/1
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:gunicorn]
command=gunicorn --log-config etc/gunicorn_logging.conf --config python:multitenant.gunicorn_config multitenant.wsgi
user=gunicorn
directory=/multitenant
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:apache]
command=/bin/bash -c "exec /usr/sbin/httpd -DFOREGROUND"
redirect_stderr=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
killasgroup=true
stopasgroup=true

[program:celery_worker]
command=/multitenant-ve/bin/celery worker -B -A multitenant -s /tmp/celerybeat-schedule --loglevel=INFO -c 1
directory=/multitenant
user=nobody
numprocs=1
autostart=true
autorestart=true
startsecs=10
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
; Need to wait for currently executing tasks to finish at shutdown.
; Increase this if you have very long running tasks.
stopwaitsecs = 600
; When resorting to send SIGKILL to the program to terminate it
; send SIGKILL to its whole process group instead,
; taking care of its children as well.
killasgroup=true
; Set Celery priority higher than default (999)
; so, if rabbitmq is supervised, it will start first.
priority=1000
